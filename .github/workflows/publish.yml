name: Node.js Package
on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  MAIN_BRANCH: main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          cache: true
          run_install: true

      - name: Build
        run: pnpm run build

      - name: Publish
        run: pnpm publish --access public
        if: github.ref_name == env.MAIN_BRANCH
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
